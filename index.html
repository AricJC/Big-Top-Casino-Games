<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Big Top Casino Games</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #1a1a2e;
            color: #eee;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .app-link {
            font-size: clamp(12px, 3vw, 14px);
            margin-bottom: 24px;
            color: #aaa;
            text-align: center;
        }
        .app-link a { color: #e94560; text-decoration: none; }
        .app-link a:hover { text-decoration: underline; }
        h1 { font-size: clamp(22px, 6vw, 36px); text-align: center; margin-bottom: 8px; }
        .subtitle { text-align: center; color: #aaa; margin: 0 0 40px; font-size: clamp(13px, 3.5vw, 16px); }
        .cards { display: flex; gap: 24px; justify-content: center; flex-wrap: wrap; }
        .card {
            width: clamp(160px, 42vw, 220px);
            background: #16213e;
            border: 2px solid #0f3460;
            border-radius: 14px;
            padding: 24px 16px;
            text-align: center;
        }
        .card:hover { border-color: #e94560; }
        .card-icon { font-size: clamp(40px, 10vw, 56px); margin-bottom: 12px; }
        .card-title { font-size: clamp(15px, 4vw, 18px); font-weight: bold; color: #fff; margin-bottom: 8px; }
        .card-desc { font-size: clamp(11px, 3vw, 13px); color: #aaa; margin-bottom: 18px; }
        .btn {
            padding: 10px 24px;
            background: #e94560;
            color: #fff;
            border-radius: 8px;
            font-size: clamp(13px, 3.5vw, 15px);
            display: inline-block;
        }
        a { text-decoration: none; }
    </style>
</head>
<body>

    <div class="app-link">&#x1F4F1; <a href="https://eventmobi.com/iowaleagueconference2026/" target="_blank">Back to Conference App</a></div>

    <!-- &#x1F3AA; = circus tent, &#x1F3AD; = drama masks, &#x1F3B0; = slot machine -->
    <h1>&#x1F3AA; Big Top Casino</h1>
    <p class="subtitle">Pick a game and play!</p>

    <div class="cards">

        <a href="memory.html">
            <div class="card">
                <div class="card-icon">&#x1F3AD;</div>
                <div class="card-title">Memory Match</div>
                <div class="card-desc">Memorize the circus cards and find every matching pair before your score runs out!</div>
                <div class="btn">Play Now</div>
            </div>
        </a>

        <a href="slots.html">
            <div class="card">
                <div class="card-icon">&#x1F3B0;</div>
                <div class="card-title">Big Top Slots</div>
                <div class="card-desc">Spin the circus reels across 3 rows and chase the &#x2B50;&#x2B50;&#x2B50; mega jackpot in 10 spins!</div>
                <div class="btn">Play Now</div>
            </div>
        </a>

    </div>

</body>
</html>
