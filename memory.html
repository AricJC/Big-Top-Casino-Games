<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Memory Match</title>
    <link rel="stylesheet" href="casino.css" />
    <link rel="stylesheet" href="memory.css" />
</head>
<body>

    <div class="app-link">&#x1F4F1; <button onclick="window.close()">Back to Conference App</button></div>

    <h2>Memory Match</h2>

    <div class="topbar">
        <p id="status" style="margin:0;">Get ready...</p>
        <p id="final-score" style="margin:0;display:none;"></p>
        <p id="tries-display" style="margin:0;">Tries Left: <span id="tries" class="accent">20</span></p>
    </div>

    <div id="countdown"></div>

    <div id="grid"></div>

    <button class="restart-btn" onclick="init()">Restart</button>

    <a href="index.html" class="back">&#x2B05; Back to Games</a>

    <script>
        var emojis = [
            '\uD83C\uDFAA',
            '\uD83C\uDFA9',
            '\uD83E\uDD39',
            '\uD83E\uDD81',
            '\uD83C\uDFB0',
            '\uD83C\uDFAF',
            '\u2B50',
            '\uD83C\uDFB2'
        ];

        var MAX_TRIES   = 20;
        var POINTS_EACH = 5;

        var flipped     = [];
        var matched     = 0;
        var lock        = false;
        var triesLeft   = MAX_TRIES;
        var score       = MAX_TRIES * POINTS_EACH;
        var memorizeSeconds = 5;
        var gameOver    = false;

        function init() {
            matched   = 0;
            flipped   = [];
            lock      = true;
            gameOver  = false;
            triesLeft = MAX_TRIES;
            score     = MAX_TRIES * POINTS_EACH;

            document.getElementById('tries').textContent = triesLeft;
            document.getElementById('tries-display').style.display = '';
            document.getElementById('final-score').style.display   = 'none';
            document.getElementById('final-score').textContent     = '';
            document.getElementById('status').textContent          = '';

            var deck = emojis.concat(emojis).sort(function () { return Math.random() - 0.5; });
            var grid = document.getElementById('grid');
            grid.innerHTML = '';

            deck.forEach(function (e) {
                var card = document.createElement('div');
                card.className = 'card revealed';
                card.dataset.val = e;
                card.textContent = e;
                card.addEventListener('click', flip);
                grid.appendChild(card);
            });

            startCountdown(memorizeSeconds);
        }

        function startCountdown(seconds) {
            var remaining   = seconds;
            var countdownEl = document.getElementById('countdown');
            var statusEl    = document.getElementById('status');

            statusEl.textContent    = 'Memorize the cards!';
            countdownEl.textContent = remaining;

            var interval = setInterval(function () {
                remaining--;
                if (remaining > 0) {
                    countdownEl.textContent = remaining;
                } else {
                    clearInterval(interval);
                    countdownEl.textContent = '';
                    hideAllCards();
                    statusEl.textContent = 'Find all pairs!';
                    lock = false;
                }
            }, 1000);
        }

        function hideAllCards() {
            document.getElementById('grid').childNodes.forEach(function (card) {
                card.textContent = '';
                card.className   = 'card';
            });
        }

        function endGame(won) {
            gameOver = true;
            lock     = true;
            document.getElementById('tries-display').style.display = 'none';
            document.getElementById('final-score').style.display   = '';
            if (won) {
                document.getElementById('status').textContent      = '\uD83C\uDF89 You matched them all!';
                document.getElementById('final-score').textContent = 'Score: ' + score;
            } else {
                document.getElementById('status').textContent      = '\uD83D\uDEAB Out of tries!';
                document.getElementById('final-score').textContent = 'Score: ' + score;
            }
        }

        function flip() {
            if (lock || gameOver || this.dataset.matched || this.dataset.flipped) return;
            this.textContent = this.dataset.val;
            this.className   = 'card revealed';
            this.dataset.flipped = '1';
            flipped.push(this);

            if (flipped.length === 2) {
                lock = true;
                setTimeout(function () {
                    if (flipped[0].dataset.val === flipped[1].dataset.val) {
                        flipped.forEach(function (c) { c.dataset.matched = '1'; });
                        matched++;
                        flipped = [];
                        lock    = false;
                        if (matched === emojis.length) {
                            endGame(true);
                        }
                    } else {
                        score     = Math.max(0, score - POINTS_EACH);
                        triesLeft = Math.max(0, triesLeft - 1);
                        document.getElementById('tries').textContent = triesLeft;
                        flipped.forEach(function (c) {
                            c.textContent = '';
                            c.className   = 'card';
                            delete c.dataset.flipped;
                        });
                        flipped = [];
                        lock    = false;
                        if (triesLeft <= 0) {
                            endGame(false);
                        }
                    }
                }, 700);
            }
        }

        init();
    </script>

</body>
</html>
