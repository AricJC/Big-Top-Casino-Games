<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <title>Memory Match</title>
</head>
<body style="font-family:Arial,sans-serif;background:#1a1a2e;color:#eee;display:flex;flex-direction:column;align-items:center;padding:30px 20px;margin:0;">

    <h2 style="margin-bottom:8px;">Memory Match</h2>

    <div style="display:flex;gap:40px;align-items:center;margin-bottom:12px;">
        <p id="status" style="font-size:16px;margin:0;">Get ready...</p>
        <p style="font-size:16px;margin:0;">Score: <span id="score" style="color:#e94560;font-weight:bold;">100</span></p>
    </div>

    <div id="countdown" style="font-size:48px;font-weight:bold;color:#e94560;min-height:60px;margin-bottom:8px;"></div>

    <div id="grid" style="display:grid;grid-template-columns:repeat(4,80px);gap:10px;"></div>

    <button onclick="init()"
        style="margin-top:20px;padding:8px 20px;font-size:15px;cursor:pointer;background:#e94560;color:#fff;border:none;border-radius:4px;">
        Restart
    </button>

    <script>
        var emojis = [
            '\uD83C\uDFAA', // ?? circus tent
            '\uD83C\uDFA9', // ?? top hat
            '\uD83E\uDD39', // ?? juggler
            '\uD83E\uDD81', // ?? lion
            '\uD83C\uDFB0', // ?? slot machine
            '\uD83C\uDFAF', // ?? bullseye
            '\u2B50',       // ? star
            '\uD83C\uDFB2'  // ?? dice
        ];

        var flipped = [];
        var matched = 0;
        var lock = false;
        var score = 100;
        var memorizeSeconds = 5;

        var cardStyleHidden  = 'width:80px;height:80px;background:#0f3460;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:32px;cursor:pointer;user-select:none;box-sizing:border-box;';
        var cardStyleRevealed = 'width:80px;height:80px;background:#16213e;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:32px;cursor:pointer;user-select:none;box-sizing:border-box;';

        function init() {
            matched = 0;
            flipped = [];
            lock = true;
            score = 100;
            document.getElementById('score').textContent = score;

            var deck = emojis.concat(emojis).sort(function () { return Math.random() - 0.5; });
            var grid = document.getElementById('grid');
            grid.innerHTML = '';

            deck.forEach(function (e) {
                var card = document.createElement('div');
                card.style.cssText = cardStyleRevealed;
                card.dataset.val = e;
                card.textContent = e;
                card.addEventListener('click', flip);
                grid.appendChild(card);
            });

            startCountdown(memorizeSeconds);
        }

        function startCountdown(seconds) {
            var remaining = seconds;
            var countdownEl = document.getElementById('countdown');
            var statusEl = document.getElementById('status');

            statusEl.textContent = 'Memorize the cards!';
            countdownEl.textContent = remaining;

            var interval = setInterval(function () {
                remaining--;
                if (remaining > 0) {
                    countdownEl.textContent = remaining;
                } else {
                    clearInterval(interval);
                    countdownEl.textContent = '';
                    hideAllCards();
                    statusEl.textContent = 'Find all pairs!';
                    lock = false;
                }
            }, 1000);
        }

        function hideAllCards() {
            var cards = document.getElementById('grid').childNodes;
            cards.forEach(function (card) {
                card.textContent = '';
                card.style.cssText = cardStyleHidden;
            });
        }

        function flip() {
            if (lock || this.dataset.matched || this.dataset.flipped) return;
            this.textContent = this.dataset.val;
            this.style.cssText = cardStyleRevealed;
            this.dataset.flipped = '1';
            flipped.push(this);

            if (flipped.length === 2) {
                lock = true;
                setTimeout(function () {
                    if (flipped[0].dataset.val === flipped[1].dataset.val) {
                        flipped.forEach(function (c) { c.dataset.matched = '1'; });
                        matched++;
                        if (matched === emojis.length) {
                            document.getElementById('status').textContent = '\uD83C\uDF89 You matched them all! Final score: ' + score;
                        }
                    } else {
                        score = Math.max(0, score - 1);
                        document.getElementById('score').textContent = score;
                        flipped.forEach(function (c) {
                            c.textContent = '';
                            c.style.cssText = cardStyleHidden;
                            delete c.dataset.flipped;
                        });
                    }
                    flipped = [];
                    lock = false;
                }, 700);
            }
        }

        init();
    </script>

</body>
</html>
