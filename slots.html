<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Big Top Slots</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #1a1a2e;
            color: #eee;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 16px;
            box-sizing: border-box;
        }
        .app-link {
            font-size: clamp(12px, 3vw, 14px);
            margin-bottom: 16px;
            color: #aaa;
            text-align: center;
        }
        .app-link a { color: #e94560; text-decoration: none; }
        .app-link a:hover { text-decoration: underline; }
        h2 { font-size: clamp(36px, 10vw, 52px); margin-bottom: 8px; }
        .scorebar { display: flex; gap: 30px; margin-bottom: 14px; font-size: clamp(22px, 6vw, 30px); color: #aaa; }
        .accent { color: #e94560; font-weight: bold; }
        .row { display: flex; gap: 0; align-items: center; margin-bottom: 8px; }
        .dash { color: #fff; font-size: clamp(12px, 3vw, 16px); padding: 0 3px; }
        .cell-top, .cell-mid {
            background: #16213e;
            border: 3px solid #0f3460;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .cell-top { width: clamp(75px, 22vw, 100px); height: clamp(60px, 17vw, 80px);  font-size: clamp(32px, 9vw,  44px); }
        .cell-mid { width: clamp(75px, 22vw, 100px); height: clamp(75px, 22vw, 100px); font-size: clamp(38px, 11vw, 52px); }
        #result { font-size: clamp(13px, 3.5vw, 16px); min-height: 24px; margin-bottom: 12px; text-align: center; }
        #spin-btn {
            padding: clamp(12px, 3vw, 14px) clamp(28px, 8vw, 40px);
            font-size: clamp(16px, 4.5vw, 18px);
            cursor: pointer;
            background: #e94560;
            color: #fff;
            border: none;
            border-radius: 8px;
        }
        .back { margin-top: 18px; font-size: clamp(12px, 3vw, 14px); color: #aaa; text-decoration: none; }
        .back:hover { color: #e94560; }
    </style>
</head>
<body>

    <div class="app-link">&#x1F4F1; <a href="https://eventmobi.com/iowaleagueconference2026/" target="_blank">Back to Conference App</a></div>

    <h2>Big Top Slots</h2>

    <div class="scorebar">
        <span>Spins: <span id="spins" class="accent">10</span></span>
        <span>Score: <span id="score" class="accent">0</span></span>
    </div>

    <!-- Top row -->
    <div class="row">
        <span class="dash">&#x2014;</span>
        <div id="t1" class="cell-top"></div>
        <span class="dash">&#x2014;</span>
        <div id="t2" class="cell-top"></div>
        <span class="dash">&#x2014;</span>
        <div id="t3" class="cell-top"></div>
        <span class="dash">&#x2014;</span>
    </div>

    <!-- Middle row -->
    <div class="row">
        <span class="dash">&#x2014;</span>
        <div id="m1" class="cell-mid"></div>
        <span class="dash">&#x2014;</span>
        <div id="m2" class="cell-mid"></div>
        <span class="dash">&#x2014;</span>
        <div id="m3" class="cell-mid"></div>
        <span class="dash">&#x2014;</span>
    </div>

    <!-- Bottom row -->
    <div class="row">
        <span class="dash">&#x2014;</span>
        <div id="b1" class="cell-top"></div>
        <span class="dash">&#x2014;</span>
        <div id="b2" class="cell-top"></div>
        <span class="dash">&#x2014;</span>
        <div id="b3" class="cell-top"></div>
        <span class="dash">&#x2014;</span>
    </div>

    <p id="result"></p>

    <button id="spin-btn" onclick="spin()">SPIN</button>

    <a href="index.html" class="back">&#x2B05; Back to Games</a>

    <script>
        var STAR = '\u2B50';

        var symbols = [
            '\uD83C\uDFAA',
            '\uD83C\uDFA9',
            '\uD83E\uDD39',
            '\uD83E\uDD81',
            '\uD83C\uDFB0',
            '\uD83C\uDFAD',
            '\uD83C\uDFA0',
            '\uD83C\uDFAF',
            STAR,
            '\uD83C\uDFB2'
        ];

        var spinsLeft = 10;
        var score = 0;
        var spinning = false;

        function getRandom() {
            return symbols[Math.floor(Math.random() * symbols.length)];
        }

        function setRow(prefix, s1, s2, s3) {
            document.getElementById(prefix + '1').textContent = s1;
            document.getElementById(prefix + '2').textContent = s2;
            document.getElementById(prefix + '3').textContent = s3;
        }

        function setBorderColor(prefix, color) {
            document.getElementById(prefix + '1').style.borderColor = color;
            document.getElementById(prefix + '2').style.borderColor = color;
            document.getElementById(prefix + '3').style.borderColor = color;
        }

        function scoreRow(a, b, c, isMiddle) {
            var isTriple = (a === b && b === c);
            var isPair   = (a === b || b === c || a === c);
            if (isTriple) {
                if (a === STAR) return { points: 1000, label: '\u2B50\u2B50\u2B50 MEGA JACKPOT! +1000' };
                var base = isMiddle ? 15 : 4;
                return { points: base * 2, label: isMiddle ? 'Center 3 of a Kind! +' + (base * 2) : 'Row 3 of a Kind! +' + (base * 2) };
            }
            if (isPair) {
                if (isMiddle) return { points: 10, label: 'Center Pair! +10' };
                return { points: 2, label: 'Pair! +2' };
            }
            return { points: 0, label: '' };
        }

        function spin() {
            if (spinning || spinsLeft <= 0) return;
            spinning = true;
            spinsLeft--;
            document.getElementById('spins').textContent = spinsLeft;
            document.getElementById('result').textContent = '';
            document.getElementById('spin-btn').style.opacity = '0.5';

            var ticks = 0;
            var maxTicks = 20;
            var interval = setInterval(function () {
                setRow('t', getRandom(), getRandom(), getRandom());
                setRow('m', getRandom(), getRandom(), getRandom());
                setRow('b', getRandom(), getRandom(), getRandom());
                ticks++;

                if (ticks >= maxTicks) {
                    clearInterval(interval);

                    var t1 = getRandom(), t2 = getRandom(), t3 = getRandom();
                    var m1 = getRandom(), m2 = getRandom(), m3 = getRandom();
                    var b1 = getRandom(), b2 = getRandom(), b3 = getRandom();
                    setRow('t', t1, t2, t3);
                    setRow('m', m1, m2, m3);
                    setRow('b', b1, b2, b3);

                    setBorderColor('t', '#0f3460');
                    setBorderColor('m', '#0f3460');
                    setBorderColor('b', '#0f3460');

                    var tScore = scoreRow(t1, t2, t3, false);
                    var mScore = scoreRow(m1, m2, m3, true);
                    var bScore = scoreRow(b1, b2, b3, false);

                    if (tScore.points > 0) setBorderColor('t', tScore.points >= 8 ? '#e94560' : '#aaa');
                    if (mScore.points > 0) setBorderColor('m', mScore.points >= 30 ? '#e94560' : '#aaa');
                    if (bScore.points > 0) setBorderColor('b', bScore.points >= 8 ? '#e94560' : '#aaa');

                    var spinPoints = tScore.points + mScore.points + bScore.points;
                    score += spinPoints;
                    document.getElementById('score').textContent = score;

                    var msgs = [];
                    if (mScore.label) msgs.push(mScore.label);
                    if (tScore.label) msgs.push(tScore.label);
                    if (bScore.label) msgs.push(bScore.label);
                    var resultEl = document.getElementById('result');
                    resultEl.textContent = msgs.length > 0 ? msgs.join('  |  ') : 'No match. Try again!';

                    if (spinsLeft <= 0) {
                        document.getElementById('spin-btn').textContent = 'Game Over!';
                        document.getElementById('spin-btn').style.background = '#555';
                        document.getElementById('spin-btn').style.cursor = 'default';
                        resultEl.textContent = 'Final Score: ' + score;
                    } else {
                        document.getElementById('spin-btn').style.opacity = '1';
                    }

                    spinning = false;
                }
            }, 60);
        }

        setRow('t', getRandom(), getRandom(), getRandom());
        setRow('m', getRandom(), getRandom(), getRandom());
        setRow('b', getRandom(), getRandom(), getRandom());
    </script>

</body>
</html>
